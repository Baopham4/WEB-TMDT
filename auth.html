<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0f172a;--panel:#111827;--muted:#9ca3af;--primary:#22c55e;--primary-2:#16a34a;--text:#e5e7eb;--danger:#ef4444}
        *{box-sizing:border-box}
        body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#0b1223);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .container{width:100%;max-width:980px;display:grid;grid-template-columns:1.1fr 1fr;background:rgba(17,24,39,.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.4)}
        .left{padding:48px;border-right:1px solid rgba(255,255,255,.07)}
        .brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
        .brand i{font-size:28px;color:var(--primary)}
        .brand h1{font-size:22px;margin:0}
        .subtitle{margin:0 0 24px 40px;color:var(--muted);font-size:14px}
        .tabs{display:flex;gap:8px;margin-bottom:24px;background:#0b1223;padding:6px;border-radius:10px}
        .tab-btn{flex:1;padding:12px 14px;border:0;border-radius:8px;background:transparent;color:var(--muted);font-weight:600;cursor:pointer}
        .tab-btn.active{background:var(--primary);color:#06121a}
        .role{display:flex;align-items:center;gap:10px;margin-bottom:18px}
        .role input{width:18px;height:18px}
        .form{display:none}
        .form.active{display:block}
        .row{display:flex;gap:12px}
        .field{margin-bottom:14px;display:flex;flex-direction:column}
        label{font-size:13px;color:var(--muted);margin-bottom:6px}
        input{padding:12px 14px;border:1px solid rgba(255,255,255,.08);background:#0b1223;color:var(--text);border-radius:10px;outline:none}
        .btn{display:inline-flex;align-items:center;gap:10px;justify-content:center;width:100%;padding:13px 16px;border:0;border-radius:10px;background:var(--primary);color:#06121a;font-weight:700;cursor:pointer}
        .btn:active{transform:translateY(1px)}
        .link{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.1)}
        .muted{color:var(--muted);font-size:14px;text-align:center;margin:14px 0}
        .switch{color:#93c5fd;cursor:pointer}
        .error{color:var(--danger);text-align:center;margin:10px 0 0 0;font-size:14px;min-height:18px}
        .right{padding:48px;background:radial-gradient(1200px 400px at 10% 10%,rgba(34,197,94,.15),transparent),radial-gradient(900px 600px at 90% 90%,rgba(168,85,247,.12),transparent)}
        .right h2{margin:0 0 8px 0}
        .right p{margin:0 0 16px 0;color:var(--muted)}
        .features{display:grid;grid-template-columns:1fr;gap:10px}
        .feat{display:flex;gap:12px;align-items:flex-start;background:#0b1223;border:1px solid rgba(255,255,255,.06);padding:12px;border-radius:12px}
        .feat i{color:var(--primary)}
        .actions{display:flex;gap:10px;margin-top:16px}
        .actions a{flex:1;text-align:center;text-decoration:none}
        @media(max-width:900px){.container{grid-template-columns:1fr}.right{display:none}.left{padding:28px}}
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="brand">
                <i class="fas fa-gem"></i>
                <h1>PHỈ THÚY CHI BẢO</h1>
            </div>
            <p class="subtitle">Đăng nhập hoặc tạo tài khoản để tiếp tục</p>
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Đăng nhập</button>
                <button class="tab-btn" data-tab="register">Đăng ký</button>
            </div>
            <div class="role">
                <input type="checkbox" id="isAdmin">
                <label for="isAdmin">Tôi là quản trị viên</label>
            </div>
            <form id="loginForm" class="form active" autocomplete="on">
                <div class="field">
                    <label for="loginEmail">Email</label>
                    <input id="loginEmail" type="email" placeholder="email@domain.com" required>
                </div>
                <div class="row">
                    <div class="field" style="flex:1">
                        <label for="loginPassword">Mật khẩu</label>
                        <input id="loginPassword" type="password" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
                <div class="muted">Chưa có tài khoản? <span class="switch" data-target="register">Đăng ký</span></div>
                <div id="loginError" class="error"></div>
            </form>
            <form id="registerForm" class="form" autocomplete="on">
                <div class="row">
                    <div class="field" style="flex:1">
                        <label for="regName">Họ tên</label>
                        <input id="regName" type="text" placeholder="Nguyễn Văn A" required>
                    </div>
                </div>
                <div class="field">
                    <label for="regEmail">Email</label>
                    <input id="regEmail" type="email" placeholder="email@domain.com" required>
                </div>
                <div class="row">
                    <div class="field" style="flex:1">
                        <label for="regPassword">Mật khẩu</label>
                        <input id="regPassword" type="password" placeholder="Ít nhất 6 ký tự" minlength="6" required>
                    </div>
                    <div class="field" style="flex:1">
                        <label for="regPassword2">Nhập lại mật khẩu</label>
                        <input id="regPassword2" type="password" placeholder="Nhập lại mật khẩu" minlength="6" required>
                    </div>
                </div>
                <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Đăng ký</button>
                <div class="muted">Đã có tài khoản? <span class="switch" data-target="login">Đăng nhập</span></div>
                <div id="registerError" class="error"></div>
            </form>
            <div class="actions">
                <a href="/" class="btn link"><i class="fas fa-home"></i> Trang chủ</a>
                <a href="/admin" class="btn link"><i class="fas a-crown"></i> Trang admin</a>
            </div>
        </div>
        
    </div>
    <script src="auth.js"></script>
    <script>
        const tabs=document.querySelectorAll('.tab-btn');const forms={login:document.getElementById('loginForm'),register:document.getElementById('registerForm')};tabs.forEach(b=>b.addEventListener('click',()=>{tabs.forEach(t=>t.classList.remove('active'));b.classList.add('active');Object.values(forms).forEach(f=>f.classList.remove('active'));forms[b.dataset.tab].classList.add('active')}));document.querySelectorAll('.switch').forEach(s=>s.addEventListener('click',()=>{tabs.forEach(t=>t.classList.remove('active'));Object.values(forms).forEach(f=>f.classList.remove('active'));const tgt=s.getAttribute('data-target');document.querySelector(`.tab-btn[data-tab="${tgt}"]`).classList.add('active');forms[tgt].classList.add('active')}));document.getElementById('loginForm').addEventListener('submit',async e=>{e.preventDefault();document.getElementById('loginError').textContent='';const email=document.getElementById('loginEmail').value.trim();const password=document.getElementById('loginPassword').value;const role=document.getElementById('isAdmin').checked?'admin':'user';const ok=await window.Auth.login({email,password,role});if(ok){if(role==='admin'){window.location.href='admin/index.html'}else{window.location.href='index.html'}}else{document.getElementById('loginError').textContent='Email hoặc mật khẩu không đúng'}});document.getElementById('registerForm').addEventListener('submit',async e=>{e.preventDefault();document.getElementById('registerError').textContent='';const name=document.getElementById('regName').value.trim();const email=document.getElementById('regEmail').value.trim();const p1=document.getElementById('regPassword').value;const p2=document.getElementById('regPassword2').value;const role=document.getElementById('isAdmin').checked?'admin':'user';if(p1!==p2){document.getElementById('registerError').textContent='Mật khẩu không trùng khớp';return}const ok=await window.Auth.register({name,email,password:p1,role});if(ok){await window.Auth.login({email,password:p1,role});if(role==='admin'){window.location.href='admin/index.html'}else{window.location.href='index.html'}}else{document.getElementById('registerError').textContent='Email đã tồn tại'}});</script>
</body>
</html>
