<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tài khoản của tôi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>body{background:linear-gradient(180deg,#003d34,#00574b);color:#e5e7eb}.wrap{max-width:900px;margin:30px auto;padding:0 16px}.card{background:rgba(0,169,143,.12);border:1px solid rgba(0,169,143,.45);border-radius:12px;padding:16px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row .field{display:flex;flex-direction:column}.field input{padding:12px;border-radius:10px;border:1px solid rgba(0,169,143,.45);background:rgba(0,169,143,.12);color:#e5e7eb}.btn{padding:12px 16px;border-radius:10px;border:0;background:#00b59d;color:#06121a;font-weight:700;cursor:pointer}.title{font-size:22px;margin:0 0 12px}</style>
</head>
<body>
<header class="header-main"><div class="logo"><i class="fas fa-user-circle"></i> TÀI KHOẢN</div><nav class="nav-menu"><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Trang chủ</a><a href="membership.html" class="nav-link"><i class="fas fa-crown"></i> Membership</a><a href="orders.html" class="nav-link"><i class="fas fa-receipt"></i> Lịch sử</a></nav></header>
<div class="wrap">
    <div class="card">
        <h1 class="title"><i class="fas fa-id-card"></i> Thông tin cá nhân</h1>
        <div class="row">
            <div class="field"><label>Họ tên</label><input id="name"></div>
            <div class="field"><label>Email</label><input id="email" disabled></div>
            <div class="field"><label>Số điện thoại</label><input id="phone"></div>
            <div class="field"><label>Địa chỉ</label><input id="address"></div>
        </div>
        <div style="margin-top:12px"><button class="btn" id="saveBtn"><i class="fas fa-save"></i> Lưu</button></div>
    </div>
    <div class="card" style="margin-top:14px">
        <h2 class="title"><i class="fas fa-chart-line"></i> Thống kê của bạn</h2>
        <div id="stats"></div>
    </div>
</div>
<script src="auth.js"></script><script src="customer-db.js"></script>
<script>
const u=JSON.parse(localStorage.getItem('currentUser')||'null');if(!u){location.href='auth.html';}
CustomerDB.ensureProfile(u);const p=CustomerDB.getProfile(u.id)||{};document.getElementById('name').value=p.name||u.name||'';document.getElementById('email').value=p.email||u.email||'';document.getElementById('phone').value=p.phone||'';document.getElementById('address').value=p.address||'';function render(){const info=CustomerDB.getMembershipForUser(u.id);const x=CustomerDB.getProfile(u.id)||{};document.getElementById('stats').innerHTML=`<div>Hạng: <strong>${info.label}</strong></div><div>Giảm giá: <strong>${info.discount||0}%</strong></div><div>Tổng chi tiêu: <strong>${(x.totalSpent||0).toLocaleString('vi-VN')} VNĐ</strong></div><div>Số đơn: <strong>${x.orderCount||0}</strong></div>`}render();document.getElementById('saveBtn').addEventListener('click',()=>{const updated={id:u.id,email:document.getElementById('email').value.trim(),name:document.getElementById('name').value.trim(),phone:document.getElementById('phone').value.trim(),address:document.getElementById('address').value.trim()};CustomerDB.saveProfile(updated);render();alert('Đã lưu thông tin')});
</script>
</body></html>
